services:
  ollama:
    build: ./ollama
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama/ollama_data:/root/.ollama

  qdrant:
    image: qdrant/qdrant
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant/qdrant_data:/qdrant/storage

  n8n:
    build: ./n8n
    container_name: rag-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - WEBHOOK_URL=http://localhost:5678/
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - N8N_BLOCK_SVC_REGISTRATION_EMAIL=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_BLOCK_NODES_IMPORT_CHECK=true
      - N8N_FILESYSTEM_ALLOWED_PATHS=/home/node/.n8n-files
    volumes:
      - ./n8n/n8n_data:/home/node/.n8n
      - "/mnt/c/_SORGENTI/GC/GeneralCavi.SelfCheckIn:/home/node/.n8n-files"
    depends_on:
      - ollama
      - qdrant

networks:
  default:
    name: n8n-rag-net
